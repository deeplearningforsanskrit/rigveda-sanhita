<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rigveda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Sanskrit&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <h1>ऋग्वेद संहिता</h1>

    <div class="reader-toolbar">
      <button id="prevTop">← Previous Sukta</button>
      <div id="pageInfo" class="page-info">Loading...</div>
      <button id="nextTop">Next Sukta →</button>
    </div>

    <input
      id="search"
      type="text"
      placeholder="Search in Devanagari or transliteration..."
      autocomplete="off"
    />

    <div id="status">Loading...</div>
  </header>

  <main>
    <div id="results"></div>

    <div class="reader-toolbar bottom-toolbar">
      <button id="prevBottom">← Previous Sukta</button>
      <div id="pageInfoBottom" class="page-info">Loading...</div>
      <button id="nextBottom">Next Sukta →</button>
    </div>

  </main>

  <script src="app.js"></script>

  <footer class="footer" align="center">
  <div>
    Developed by 
    <a href="https://abhi-glitchhg.github.io/" target="_blank">
      Abhijit Deo
    </a>
  </div>

  <div>
    <a href="https://deeplearningforsanskrit.github.io/" target="_blank">
      Project Website
    </a>
  </div>

  <div class="tagline">
    वन्दे गुरु परम्पराम्
  </div>
</footer>
</body>
</html>
